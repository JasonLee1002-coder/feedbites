# ============================================================
# Feedbites nginx 設定片段
# 加入到 omnicore-nginx 主設定的 server {} 區塊內
# ============================================================

# 靜態上傳檔案（直接 serve，不走 Next.js）
location /feedbites/uploads/ {
    alias /home/jason/feedbites-uploads/;
    expires 30d;
    add_header Cache-Control "public, immutable";
}

# Feedbites Next.js 應用
location /feedbites/ {
    proxy_pass http://feedbites:3200/feedbites/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 60s;
}
